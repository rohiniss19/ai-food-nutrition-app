name: Full Stack CI/CD (Frontend + Backend + Smart Full Build)

on:
  push:
    branches: ["main"]

jobs:

  # -----------------------------------
  # Detect changes (frontend/backend/workflow)
  # -----------------------------------
  changes:
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      full: ${{ steps.filter.outputs.full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            full:
              - '.github/workflows/**'

  # -----------------------------------
  # FRONTEND BUILD + PUSH
  # -----------------------------------
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Frontend Image
        run: |
          docker build -t rohiniss19/frontend:latest ./frontend

      - name: Push Frontend Image
        run: |
          docker push rohiniss19/frontend:latest

  # -----------------------------------
  # BACKEND BUILD + PUSH
  # -----------------------------------
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Create .env safely from GitHub Secrets
      - name: Create backend .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > backend/.env

      - name: Build Backend Image
        run: |
          docker build -t rohiniss19/backend:latest ./backend

      - name: Push Backend Image
        run: |
          docker push rohiniss19/backend:latest